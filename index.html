<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }
        .box {
            background: #e7aa4e;
            padding: 40px;
            width: 100px;
            margin: 30px auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        #randomNumber {
            font-size: 3rem;
            font-weight: bold;
            color: #fff5d6;
        }
    </style>
</head>
<body>
    <h1>Random Number Generator</h1>
    <input type="number" id="minValue" placeholder="Min Value" size="10"/>
    <input type="number" id="maxValue" placeholder="Max Value" size="10"/>
    <button onclick="generateRandomNumber()">Generate</button>

    <div class="box">
        <div id="randomNumber">0</div>
    </div>

    <script>
        let RandomNum;

        function generateRandomNumber(){
            const minValue = Math.ceil(document.getElementById('minValue').value);
            const maxValue = Math.ceil(document.getElementById('maxValue').value);

            let randomNum = Math.floor(Math.random() * (maxValue - minValue + 1)) + minValue;

        document.getElementById('randomNumber').textContent = randomNum;

        }
    </script>
    
</body>
</html>
